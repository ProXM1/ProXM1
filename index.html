<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProXM1 | Command Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #07020d;
            --bg-panel: rgba(15, 5, 25, 0.85);
            --neon-blue: #00f3ff;
            --neon-purple: #b500ff;
            --text-main: #e2dcf2;
            --text-muted: #8b7ca6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: var(--neon-purple) var(--bg-base);
        }

        h1, h2, h3 {
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- HERO SECTION & PARTICLES --- */
        #hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 2px solid var(--neon-purple);
            box-shadow: 0 5px 30px rgba(181, 0, 255, 0.2);
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none; /* Let mouse interact with canvas behind */
        }

        .hero-title {
            font-size: 6rem;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue), 0 0 40px var(--neon-purple);
            margin-bottom: 10px;
        }

        .hero-subtitle {
            font-size: 1.5rem;
            color: var(--neon-blue);
            letter-spacing: 5px;
        }

        /* --- LEVEL SELECT (CASE STUDIES) --- */
        #missions {
            padding: 6rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .section-header h2 {
            font-size: 2.5rem;
            color: var(--neon-purple);
            text-shadow: 0 0 10px rgba(181, 0, 255, 0.5);
        }

        .section-header p {
            color: var(--text-muted);
            font-size: 1.2rem;
            margin-top: 10px;
        }

        .level-card {
            background: var(--bg-panel);
            border: 1px solid rgba(181, 0, 255, 0.3);
            border-left: 4px solid var(--neon-purple);
            margin-bottom: 2rem;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            backdrop-filter: blur(10px);
        }

        .level-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.15);
            transform: translateX(10px);
        }

        .level-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .level-title {
            font-size: 1.8rem;
            color: #fff;
        }

        .level-status {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--neon-purple);
            border: 1px solid var(--neon-purple);
            padding: 5px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .level-card.unlocked .level-status {
            color: var(--neon-blue);
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.4);
        }

        .progress-container {
            margin-top: 1.5rem;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .progress-track {
            height: 6px;
            background: #1a0f2e;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-blue));
            box-shadow: 0 0 10px var(--neon-blue);
            transition: width 1.5s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        /* Video Trailer Expansion */
        .trailer-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.8s cubic-bezier(0.1, 0.8, 0.2, 1), margin-top 0.8s;
            opacity: 0;
        }

        .level-card.unlocked .trailer-wrapper {
            max-height: 500px;
            margin-top: 2rem;
            opacity: 1;
        }

        .video-placeholder {
            width: 100%;
            height: 350px;
            background: #000;
            border: 1px solid var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* Scanline effect for video placeholder */
        .video-placeholder::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .level-desc {
            margin-top: 1rem;
            color: var(--text-main);
            line-height: 1.6;
        }

    </style>
</head>
<body>

    <!-- Hero Section -->
    <section id="hero">
        <canvas id="canvas-container"></canvas>
        <div class="hero-content">
            <h1 class="hero-title">ProXM1</h1>
            <div class="hero-subtitle">ESTABLISHED 1992 // GLOBAL RANKING: GRANDMASTER</div>
        </div>
    </section>

    </section>

    <script>
        /* --- PARTICLE SYSTEM LOGIC --- */
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        
        let particlesArray = [];
        let mouse = {
            x: null,
            y: null,
            radius: 150
        }

        // Handle Resize
        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        // Mouse Events
        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        window.addEventListener('mouseout', function() {
            mouse.x = undefined;
            mouse.y = undefined;
        });

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
                this.baseX = this.x;
                this.baseY = this.y;
                this.density = (Math.random() * 30) + 1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.fill();
            }

            update() {
                // Check canvas bounds
                if(this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if(this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                // Mouse interactivity (repel effect)
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                let forceDirectionX = dx / distance;
                let forceDirectionY = dy / distance;
                
                // Max distance, past that the force is 0
                let maxDistance = mouse.radius;
                let force = (maxDistance - distance) / maxDistance;
                
                // If we went below zero, set it to zero.
                if (force < 0) force = 0;

                let directionX = (forceDirectionX * force * this.density);
                let directionY = (forceDirectionY * force * this.density);

                if (distance < mouse.radius) {
                    this.x -= directionX;
                    this.y -= directionY;
                } else {
                    if (this.x !== this.baseX) {
                        let dx = this.x - this.baseX;
                        this.x -= dx/10;
                    }
                    if (this.y !== this.baseY) {
                        let dy = this.y - this.baseY;
                        this.y -= dy/10;
                    }
                }

                this.x += this.directionX;
                this.y += this.directionY;

                this.draw();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.height * canvas.width) / 9000;
            // Limit particles for performance
            if(numberOfParticles > 200) numberOfParticles = 200;

            const colors = ['#00f3ff', '#b500ff', '#4a00e0'];

            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 2) + 1;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 2) - 1;
                let directionY = (Math.random() * 2) - 1;
                let color = colors[Math.floor(Math.random() * colors.length)];

                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        // Connection lines between particles
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    if (distance < (canvas.width/7) * (canvas.height/7)) {
                        opacityValue = 1 - (distance / 20000);
                        ctx.strokeStyle = 'rgba(0, 243, 255,' + opacityValue + ')';
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            ctx.clearRect(0,0,innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connect();
        }

        // Initialization
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initParticles();
        animate();


        /* --- LEVEL UNLOCK LOGIC --- */
        function unlockLevel(cardElement) {
            // Prevent re-triggering if already unlocked
            if (cardElement.classList.contains('unlocked')) return;

            const progressBar = cardElement.querySelector('.progress-fill');
            const percentText = cardElement.querySelector('.progress-percent');
            const statusText = cardElement.querySelector('.level-status');
            
            // Add unlocked class to trigger CSS transitions
            cardElement.classList.add('unlocked');
            
            // Trigger Progress Bar
            setTimeout(() => {
                progressBar.style.width = '100%';
                statusText.innerText = 'DECRYPTING...';
                
                // Animate the percentage number
                let count = 0;
                let interval = setInterval(() => {
                    count += 2; // Speed of counting
                    if(count > 100) count = 100;
                    percentText.innerText = count + '%';
                    
                    if(count >= 100) {
                        clearInterval(interval);
                        statusText.innerText = 'UNLOCKED';
                    }
                }, 25);
            }, 100);
        }
    </script>
</body>
</html>
